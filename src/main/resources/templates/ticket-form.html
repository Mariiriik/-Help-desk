<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создать заявку | Help Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/tickets}">Заявки</a>
            <a class="nav-link active" th:href="@{/tickets/new}">Создать</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="mb-3">Создание заявки</h1>
                    <p class="text-muted mb-4">Заполните форму, и поддержка свяжется с вами.</p>

                    <form th:action="@{/tickets}" th:object="${ticket}" method="post">
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Ваше имя</label>
                            <input id="customerName" type="text" class="form-control" th:field="*{customerName}" th:errorclass="is-invalid" placeholder="Иван Иванов">
                            <div class="invalid-feedback" th:errors="*{customerName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="title" class="form-label">Тема заявки</label>
                            <input id="title" type="text" class="form-control" th:field="*{title}" th:errorclass="is-invalid" placeholder="Не работает принтер">
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label">Описание проблемы</label>
                            <textarea id="description" rows="5" class="form-control" th:field="*{description}" th:errorclass="is-invalid" placeholder="Опишите, что произошло"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Отправить заявку</button>
                            <a th:href="@{/tickets}" class="btn btn-outline-secondary">Назад</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
